name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false  # nunca cancelar un release en curso

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - name: macOS (Apple Silicon)
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: lumus-control-macos-aarch64
            bundle-path: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz*

          # Windows x86_64
          - name: Windows (x86_64)
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: lumus-control-windows-x86_64
            bundle-path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      # cargo test solo en aarch64 — unit tests son independientes de arch y plataforma.
      # Evita correr los mismos tests en cada runner.
      - name: Run Rust tests
        if: matrix.target == 'aarch64-apple-darwin'
        run: cargo test --release --manifest-path src-tauri/Cargo.toml

      - name: Set up signing key file
        run: |
          if [ -z "$RAW_KEY" ]; then
            echo "ERROR: TAURI_SIGNING_PRIVATE_KEY secret is empty or not set"
            exit 1
          fi
          node -e "require('fs').writeFileSync(process.env.KEY_PATH, process.env.RAW_KEY.replace(/\s+/g, ''))"
        shell: bash
        env:
          RAW_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          KEY_PATH: ${{ github.workspace }}/tauri.key

      - name: Build Tauri app
        run: pnpm tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ github.workspace }}/tauri.key

      - name: Rename macOS artifacts for compatibility
        if: matrix.os == 'macos-latest'
        run: |
          # Rename DMG to lowercase and hyphen-separated format for Homebrew cask compatibility
          cd src-tauri/target/${{ matrix.target }}/release/bundle/dmg/
          ORIGINAL_DMG=$(find . -name "*.dmg" | head -n 1)
          if [ -n "$ORIGINAL_DMG" ]; then
            NEW_DMG=$(echo "$ORIGINAL_DMG" | sed -E 's/[Ll]umus[ ._-]+[Cc]ontrol/lumus-control/g')
            if [ "$ORIGINAL_DMG" != "$NEW_DMG" ]; then
              echo "Renaming DMG: $ORIGINAL_DMG -> $NEW_DMG"
              mv "$ORIGINAL_DMG" "$NEW_DMG"
            fi
          fi
          
          # Rename updater tar.gz and sig (replace spaces with dots to prevent normalization issues in download URLs)
          cd ../macos/
          for f in *Lumus*.tar.gz*; do
            if [ -f "$f" ]; then
              NEW_NAME=$(echo "$f" | sed 's/Lumus Control/Lumus.Control/g')
              if [ "$f" != "$NEW_NAME" ]; then
                echo "Renaming updater file: $f -> $NEW_NAME"
                mv "$f" "$NEW_NAME"
              fi
            fi
          done
          true
        shell: bash

      - name: Rename Windows artifacts for compatibility
        if: matrix.os == 'windows-latest'
        run: |
          cd src-tauri/target/${{ matrix.target }}/release/bundle/nsis/
          for f in *Lumus*.exe*; do
            if [ -f "$f" ]; then
              NEW_NAME=$(echo "$f" | sed 's/Lumus Control/Lumus.Control/g')
              if [ "$f" != "$NEW_NAME" ]; then
                echo "Renaming Windows file: $f -> $NEW_NAME"
                mv "$f" "$NEW_NAME"
              fi
            fi
          done
          true
        shell: bash

      - name: Clean up signing key file
        if: always()  # limpiar incluso si el build falla — la key nunca debe quedar en disco
        run: rm -f "${{ github.workspace }}/tauri.key"
        shell: bash

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.bundle-path }}
            install.sh

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate changelog
        run: |
          set -Eeuo pipefail
          echo "## What's Changed" > release_body.md
          echo "" >> release_body.md
          PREVIOUS=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -n "$PREVIOUS" ]; then
            git log "$PREVIOUS..HEAD" --no-merges --pretty=format:"- %s" >> release_body.md
          else
            git log --no-merges --pretty=format:"- %s" >> release_body.md
          fi

      - name: Generate updater JSON
        run: |
          set -Eeuo pipefail

          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          MAC_FILE=$(find artifacts -name "*.app.tar.gz" -exec basename {} \; | head -n 1)
          MAC_SIG_FILE=$(find artifacts -name "*.app.tar.gz.sig" -exec basename {} \; | head -n 1)

          WIN_FILE=$(find artifacts -name "*_x64-setup.exe" -exec basename {} \; | head -n 1)
          WIN_SIG_FILE=$(find artifacts -name "*_x64-setup.exe.sig" -exec basename {} \; | head -n 1)

          MAC_SIG=""
          if [ -n "$MAC_SIG_FILE" ] && [ -f "artifacts/$MAC_SIG_FILE" ]; then
            MAC_SIG=$(cat "artifacts/$MAC_SIG_FILE" | tr -d '\n\r ')
          fi

          WIN_SIG=""
          if [ -n "$WIN_SIG_FILE" ] && [ -f "artifacts/$WIN_SIG_FILE" ]; then
            WIN_SIG=$(cat "artifacts/$WIN_SIG_FILE" | tr -d '\n\r ')
          fi

          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat << EOF > artifacts/update.json
          {
            "version": "$VERSION",
            "notes": "Lumus Control v$VERSION release. See GitHub Release for details.",
            "pub_date": "$PUB_DATE",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$MAC_SIG",
                "url": "https://github.com/${{ github.repository }}/releases/download/$TAG/$MAC_FILE"
              },
              "windows-x86_64": {
                "signature": "$WIN_SIG",
                "url": "https://github.com/${{ github.repository }}/releases/download/$TAG/$WIN_FILE"
              }
            }
          }
          EOF

          sed -i 's/^[[:space:]]*//' artifacts/update.json

          echo "Generated update.json:"
          cat artifacts/update.json

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_body.md
          files: artifacts/**
          draft: false
          # Marcar automáticamente como prerelease si el tag contiene un guion (ej. v0.4.0-rc1)
          prerelease: ${{ contains(github.ref_name, '-') }}
          token: ${{ secrets.GITHUB_TOKEN }}

  update-tap:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    # Solo ejecuta en tags reales de producción (vX.Y.Z) que NO contengan guiones (evita v0.0.0-rc1, v0.0.0-test, etc.)
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: dotfn/homebrew-lumus
          token: ${{ secrets.TAP_PAT }}
          path: homebrew-lumus

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: lumus-control-macos-aarch64
          path: macos-artifact

      - name: Compute SHA256
        id: shas
        run: |
          set -Eeuo pipefail

          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Buscar el DMG en el directorio del artefacto local
          DMG_FILE=$(find macos-artifact -name "*.dmg" | head -n 1)
          if [ -z "$DMG_FILE" ] || [ ! -f "$DMG_FILE" ]; then
            echo "ERROR: No se encontró el archivo DMG en el artefacto macos-control-macos-aarch64" >&2
            exit 1
          fi

          ARM_SHA=$(shasum -a 256 "$DMG_FILE" | cut -d' ' -f1)
          echo "arm_sha256=${ARM_SHA}" >> "$GITHUB_OUTPUT"
          echo "ARM64 SHA256: ${ARM_SHA}"

      - name: Update cask
        env:
          VERSION: ${{ steps.shas.outputs.version }}
          ARM_SHA: ${{ steps.shas.outputs.arm_sha256 }}
        run: |
          set -Eeuo pipefail
          cd homebrew-lumus

          {
            echo 'cask "lumus-control" do'
            echo "  version \"${VERSION}\""
            echo "  sha256 \"${ARM_SHA}\""
            echo ""
            echo "  url \"https://github.com/dotfn/lumus-control/releases/download/v#{version}/lumus-control_#{version}_aarch64.dmg\","
            echo '      verified: "github.com/dotfn/lumus-control/"'
            echo '  name "Lumus Control"'
            echo '  desc "Panel local para controlar lámparas WiZ via UDP"'
            echo '  homepage "https://lumus-control.vercel.app"'
            echo ""
            echo "  depends_on arch: :arm64"
            echo ""
            echo "  livecheck do"
            echo "    url :url"
            echo "    strategy :github_latest"
            echo "  end"
            echo ""
            echo '  app "Lumus Control.app"'
            echo ""
            echo "  postflight do"
            echo '    system_command "/usr/bin/xattr",'
            echo '                   args: ["-dr", "com.apple.quarantine", "#{appdir}/Lumus Control.app"]'
            echo "  end"
            echo "end"
          } > Casks/lumus-control.rb

          echo "Cask generado:"
          cat Casks/lumus-control.rb

      - name: Validate cask
        run: |
          set -Eeuo pipefail
          cd homebrew-lumus
          grep -q 'version "[^"]' Casks/lumus-control.rb || { echo "ERROR: version field is empty"; exit 1; }
          grep -q 'sha256 "[^"]' Casks/lumus-control.rb || { echo "ERROR: sha256 field is empty"; exit 1; }
          ruby -c Casks/lumus-control.rb

      - name: Commit and push
        env:
          VERSION: ${{ steps.shas.outputs.version }}
        run: |
          set -Eeuo pipefail
          cd homebrew-lumus
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/lumus-control.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update lumus-control to v${VERSION}"
          git push
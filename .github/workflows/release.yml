name: Release

on:
  # Tags v* siempre buildean y publican — sin path filter.
  # Separado de build.yml para que el path filter de main
  # no afecte accidentalmente a los releases.
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false  # nunca cancelar un release en curso

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - name: macOS (Apple Silicon)
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: lumus-control-macos-aarch64
            bundle-path: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz*

          # Windows x86_64
          - name: Windows (x86_64)
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: lumus-control-windows-x86_64
            bundle-path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      # cargo test solo en aarch64 — unit tests son independientes de arch y plataforma.
      # Evita correr los mismos tests 3 veces.
      - name: Run Rust tests
        if: matrix.target == 'aarch64-apple-darwin'
        run: cargo test --release --manifest-path src-tauri/Cargo.toml

      - name: Set up signing key
        run: |
          CLEAN_KEY=$(echo "$RAW_KEY" | tr -d '\n\r ')
          echo "TAURI_SIGNING_PRIVATE_KEY=$CLEAN_KEY" >> "$GITHUB_ENV"
        shell: bash
        env:
          RAW_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build Tauri app
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.bundle-path }}
            install.sh

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate changelog
        run: |
          set -Eeuo pipefail
          echo "## What's Changed" > release_body.md
          echo "" >> release_body.md
          PREVIOUS=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -n "$PREVIOUS" ]; then
            git log "$PREVIOUS..HEAD" --pretty=format:"- %s" >> release_body.md
          else
            git log --pretty=format:"- %s" >> release_body.md
          fi

      - name: Generate updater JSON
        run: |
          set -Eeuo pipefail

          TAG="${{ github.event.release.tag_name || github.ref_name }}"
          VERSION="${TAG#v}"

          MAC_FILE=$(find artifacts -name "*.app.tar.gz" -exec basename {} \; | head -n 1)
          MAC_SIG_FILE=$(find artifacts -name "*.app.tar.gz.sig" -exec basename {} \; | head -n 1)

          WIN_FILE=$(find artifacts -name "*_x64-setup.exe" -exec basename {} \; | head -n 1)
          WIN_SIG_FILE=$(find artifacts -name "*_x64-setup.exe.sig" -exec basename {} \; | head -n 1)

          MAC_SIG=""
          if [ -n "$MAC_SIG_FILE" ] && [ -f "artifacts/$MAC_SIG_FILE" ]; then
            MAC_SIG=$(cat "artifacts/$MAC_SIG_FILE" | tr -d '\n\r ')
          fi

          WIN_SIG=""
          if [ -n "$WIN_SIG_FILE" ] && [ -f "artifacts/$WIN_SIG_FILE" ]; then
            WIN_SIG=$(cat "artifacts/$WIN_SIG_FILE" | tr -d '\n\r ')
          fi

          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat << EOF > artifacts/update.json
          {
            "version": "$VERSION",
            "notes": "Lumus Control v$VERSION release. See GitHub Release for details.",
            "pub_date": "$PUB_DATE",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$MAC_SIG",
                "url": "https://github.com/${{ github.repository }}/releases/download/$TAG/$MAC_FILE"
              },
              "windows-x86_64": {
                "signature": "$WIN_SIG",
                "url": "https://github.com/${{ github.repository }}/releases/download/$TAG/$WIN_FILE"
              }
            }
          }
          EOF
          
          sed -i 's/^[[:space:]]*//' artifacts/update.json
          
          echo "Generated update.json:"
          cat artifacts/update.json

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_body.md
          files: artifacts/**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.TAP_PAT }}

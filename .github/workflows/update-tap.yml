name: Update Homebrew Tap

on:
  release:
    types: [published]

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: dotfn/homebrew-lumus
          token: ${{ secrets.TAP_PAT }}
          path: homebrew-lumus

      - name: Compute SHA256 for Apple Silicon
        id: shas
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail

          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          ARM_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/lumus-control_${VERSION}_aarch64.dmg"

          echo "Downloading ARM64 DMG from: ${ARM_URL}"
          ARM_SHA=$(curl --fail --silent --location "${ARM_URL}" | shasum -a 256 | cut -d' ' -f1)
          if [ -z "${ARM_SHA}" ]; then
            echo "ERROR: ARM64 SHA256 is empty — DMG download may have failed" >&2
            exit 1
          fi

          echo "arm_sha256=${ARM_SHA}" >> "$GITHUB_OUTPUT"
          echo "ARM64  SHA256: ${ARM_SHA}"

      - name: Update cask
        # IMPORTANT: heredoc sin comillas ('EOF' → EOF) para que las variables
        # de shell se expandan. Las de GitHub Actions ya fueron interpoladas
        # antes de que el runner ejecute el script.
        env:
          VERSION: ${{ steps.shas.outputs.version }}
          ARM_SHA: ${{ steps.shas.outputs.arm_sha256 }}
        run: |
          set -Eeuo pipefail
          cd homebrew-lumus

          cat > Casks/lumus-control.rb << EOF
cask "lumus-control" do
  version "${VERSION}"
  sha256 "${ARM_SHA}"

  url "https://github.com/dotfn/lumus-control/releases/download/v#{version}/lumus-control_#{version}_aarch64.dmg",
      verified: "github.com/dotfn/lumus-control/"
  name "Lumus Control"
  desc "Panel local para controlar lámparas WiZ via UDP"
  homepage "https://lumus-control.vercel.app"

  depends_on arch: :arm64

  livecheck do
    url :url
    strategy :github_latest
  end

  app "lumus-control.app"

  postflight do
    system_command "/usr/bin/xattr",
                   args: ["-dr", "com.apple.quarantine", "#{appdir}/lumus-control.app"]
  end
end
EOF

          echo "Cask generado:"
          cat Casks/lumus-control.rb

      - name: Commit and push
        env:
          VERSION: ${{ steps.shas.outputs.version }}
        run: |
          set -Eeuo pipefail
          cd homebrew-lumus
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/lumus-control.rb
          # Si no hay cambios (re-run del mismo tag), el commit no falla
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update lumus-control to v${VERSION}"
          git push

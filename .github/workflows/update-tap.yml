name: Update Homebrew Tap

on:
  release:
    types: [published]

jobs:
  update-tap:
    # FIX: cambiar a ubuntu-latest — el job solo hace git, curl y sed.
    # El sed -i'' de BSD (macOS) se reemplaza por GNU sed compatible con ubuntu.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: dotfn/homebrew-lumus
          token: ${{ secrets.TAP_PAT }}
          path: homebrew-lumus

      - name: Compute SHA256 for all architectures
        id: shas
        env:
          GH_TOKEN: ${{ github.token }}
        # FIX: set -Eeuo pipefail + validación de curl
        # Sin esto, si la URL del DMG falla, curl retorna vacío y shasum produce
        # un hash de string vacío, corrompiendo silenciosamente el cask de Homebrew.
        run: |
          set -Eeuo pipefail

          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          ARM_URL="https://github.com/${{ github.repository }}/releases/download/$TAG/lumus-control_${VERSION}_aarch64.dmg"
          INTEL_URL="https://github.com/${{ github.repository }}/releases/download/$TAG/lumus-control_${VERSION}_x86_64.dmg"

          echo "Downloading ARM64 DMG from: $ARM_URL"
          ARM_SHA=$(curl --fail --silent --location "$ARM_URL" | shasum -a 256 | cut -d' ' -f1)
          if [ -z "$ARM_SHA" ]; then
            echo "ERROR: ARM64 SHA256 is empty — DMG download may have failed" >&2
            exit 1
          fi

          echo "Downloading x86_64 DMG from: $INTEL_URL"
          INTEL_SHA=$(curl --fail --silent --location "$INTEL_URL" | shasum -a 256 | cut -d' ' -f1)
          if [ -z "$INTEL_SHA" ]; then
            echo "ERROR: x86_64 SHA256 is empty — DMG download may have failed" >&2
            exit 1
          fi

          echo "arm_sha256=$ARM_SHA" >> "$GITHUB_OUTPUT"
          echo "intel_sha256=$INTEL_SHA" >> "$GITHUB_OUTPUT"

          echo "ARM64  SHA256: $ARM_SHA"
          echo "x86_64 SHA256: $INTEL_SHA"

      - name: Update cask
        # FIX: usar GNU sed (ubuntu) en lugar de BSD sed (macOS).
        # GNU sed no requiere el argumento vacío después de -i.
        run: |
          set -Eeuo pipefail
          cd homebrew-lumus
          sed -i "s/version \".*\"/version \"${{ steps.shas.outputs.version }}\"/" Casks/lumus-control.rb
          sed -i "/on_arm do/{n;s/sha256 :no_check/sha256 \"${{ steps.shas.outputs.arm_sha256 }}\"/;}" Casks/lumus-control.rb
          sed -i "/on_intel do/{n;s/sha256 :no_check/sha256 \"${{ steps.shas.outputs.intel_sha256 }}\"/;}" Casks/lumus-control.rb

      - name: Commit and push
        run: |
          set -Eeuo pipefail
          cd homebrew-lumus
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Casks/lumus-control.rb
          git commit -m "chore: update to v${{ steps.shas.outputs.version }}"
          git push

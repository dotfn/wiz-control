name: Build (main)

on:
  # Solo buildea en main cuando cambia código fuente relevante.
  # Útil para detectar problemas de build antes de taggear un release.
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

concurrency:
  group: build-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build macOS (Apple Silicon)
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch }}-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.arch }}

      # cargo test solo en aarch64 — unit tests son independientes de arch target
      - name: Run Rust tests
        if: matrix.arch == 'aarch64'
        run: cargo test --release --manifest-path src-tauri/Cargo.toml

      - name: Set up signing key file
        run: |
          node -e "require('fs').writeFileSync(process.env.KEY_PATH, process.env.RAW_KEY.replace(/\s+/g, ''))"
        shell: bash
        env:
          RAW_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          KEY_PATH: ${{ github.workspace }}/tauri.key

      - name: Build Tauri app
        run: pnpm tauri build --target ${{ matrix.arch }}-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ github.workspace }}/tauri.key

      - name: Clean up signing key file
        run: |
          rm -f "${{ github.workspace }}/tauri.key"
        shell: bash

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: lumus-control-macos-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.arch }}-apple-darwin/release/bundle/dmg/*.dmg
            install.sh

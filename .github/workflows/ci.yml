name: CI

on:
  push:
    branches:
      - develop
      - 'feature/**'
      - 'fix/**'
      - 'hotfix/**'
      - 'chore/**'
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tailwind.config.js'
      - 'tsconfig*.json'
      - '.eslintrc*'
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    # FIX: usar ubuntu-latest — typecheck/lint son Node puro, no necesitan macOS.
    # macos-latest consume 10× más minutos de GitHub Actions que ubuntu-latest.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          # FIX: cache-dependency-path explícito mejora el hit ratio del cache
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint

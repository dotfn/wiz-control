<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>WiZ Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0b0b0e;
    --panel: rgba(255,255,255,0.045);
    --panel-strong: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.09);
    --text: #f5f2ea;
    --text-dim: #9a968c;
    --accent: #ffb454;
    --danger: #ff6b6b;
    --display: 'Space Grotesk', 'Inter', sans-serif;
    --body-font: 'Inter', -apple-system, sans-serif;
    --mono: 'JetBrains Mono', 'SF Mono', monospace;
    --glow-color: 255,180,84;
    --glow-strength: 0.0;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 50% 0%, rgba(255,255,255,0.04), transparent 60%),
      var(--bg);
    color: var(--text);
    font-family: var(--body-font);
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 28px 16px;
  }
  .card{
    width:100%;
    max-width: 440px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 28px 26px 24px;
    backdrop-filter: blur(20px);
  }
  header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom: 18px;
  }
  h1{
    font-family: var(--display);
    font-size: 19px;
    font-weight: 700;
    letter-spacing: 0.01em;
    margin:0;
  }
  #conn-status{
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
  }
  #conn-status.ok{ color: #8fd19e; }

  .orb-wrap{
    display:flex;
    justify-content:center;
    padding: 18px 0 22px;
  }
  .orb{
    width: 132px;
    height: 132px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 32%,
        rgba(var(--glow-color), calc(0.55 + var(--glow-strength)*0.45)),
        rgba(var(--glow-color), calc(0.12 + var(--glow-strength)*0.2)) 60%,
        rgba(255,255,255,0.02) 100%);
    box-shadow:
        0 0 calc(20px + 60px * var(--glow-strength)) calc(2px + 14px * var(--glow-strength)) rgba(var(--glow-color), calc(0.35 * var(--glow-strength))),
        inset 0 0 18px rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    transition: box-shadow 0.5s ease, background 0.5s ease;
    animation: breathe 4.5s ease-in-out infinite;
  }
  .orb.off{ animation: none; }
  @keyframes breathe{
    0%,100%{ transform: scale(1); }
    50%{ transform: scale(1.025); }
  }

  .row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin: 14px 0;
  }
  .power-btn{
    display:flex;
    align-items:center;
    gap:10px;
    background: var(--panel-strong);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--body-font);
    font-weight: 600;
    font-size: 14px;
    padding: 11px 18px;
    border-radius: 14px;
    cursor:pointer;
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  .power-btn:hover{ background: rgba(255,255,255,0.1); }
  .power-btn .dot{
    width:8px; height:8px; border-radius:50%;
    background: var(--text-dim);
    transition: background 0.2s ease, box-shadow 0.2s ease;
  }
  .power-btn.on .dot{
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  label.field-label{
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    font-weight: 600;
  }

  input[type=range]{
    -webkit-appearance:none;
    width:100%;
    height: 4px;
    border-radius: 4px;
    background: rgba(255,255,255,0.12);
    outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:16px; height:16px;
    border-radius:50%;
    background: var(--text);
    cursor:pointer;
    border: 3px solid var(--bg);
    box-shadow: 0 0 0 1px var(--border);
  }

  .tabs{
    display:flex;
    gap:6px;
    background: rgba(255,255,255,0.04);
    border:1px solid var(--border);
    border-radius: 12px;
    padding: 3px;
    margin: 18px 0 14px;
  }
  .tab{
    flex:1;
    text-align:center;
    padding: 8px 0;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    border-radius: 9px;
    cursor:pointer;
    user-select:none;
  }
  .tab.active{
    background: rgba(255,255,255,0.09);
    color: var(--text);
  }

  .panel-section{ display:none; }
  .panel-section.active{ display:block; }

  .swatches{
    display:flex;
    gap:9px;
    margin: 10px 0 4px;
    flex-wrap: wrap;
  }
  .swatch{
    width: 30px; height: 30px;
    border-radius: 50%;
    cursor:pointer;
    border: 2px solid rgba(255,255,255,0.18);
    transition: transform 0.12s ease, border-color 0.12s ease;
  }
  .swatch:hover{ transform: scale(1.1); }
  .swatch.custom-pick{
    display:flex; align-items:center; justify-content:center;
    background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red);
  }
  .swatch.custom-pick input{
    opacity:0; width:30px; height:30px; cursor:pointer;
  }

  .temp-row{ margin-top: 6px; }
  .temp-labels{
    display:flex; justify-content:space-between;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 6px;
  }

  hr.sep{
    border:none;
    border-top: 1px solid var(--border);
    margin: 20px 0 14px;
  }

  .devices-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom: 10px;
  }
  .devices-head h2{
    font-family: var(--display);
    font-size: 13px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin:0;
  }
  .scan-btn{
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--body-font);
    font-size: 12px;
    font-weight: 600;
    padding: 7px 12px;
    border-radius: 10px;
    cursor:pointer;
  }
  .scan-btn:hover{ background: rgba(255,255,255,0.06); }
  .scan-btn:disabled{ opacity:0.5; cursor:default; }

  .device-list{ display:flex; flex-direction:column; gap:8px; }
  .device-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 10px 12px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
    cursor:pointer;
    font-size: 13px;
  }
  .device-item:hover{ background: rgba(255,255,255,0.05); }
  .device-item.selected{
    border-color: rgba(255,180,84,0.5);
    background: rgba(255,180,84,0.06);
  }
  .device-item .ip{ font-family: var(--mono); }
  .device-item .meta{ color: var(--text-dim); font-size: 12px; }
  .empty-hint{
    color: var(--text-dim);
    font-size: 13px;
    line-height: 1.5;
  }
  .manual-ip{
    display:flex; gap:8px; margin-top: 10px;
  }
  .manual-ip input{
    flex:1;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 9px 10px;
    outline:none;
  }
  .manual-ip button{
    background: var(--panel-strong);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 12px;
    font-weight: 600;
    border-radius: 10px;
    padding: 0 14px;
    cursor:pointer;
  }
</style>
</head>
<body>
  <div class="card">
    <header>
      <h1>WiZ Control</h1>
      <span id="conn-status">sin lámpara seleccionada</span>
    </header>

    <div class="orb-wrap">
      <div class="orb off" id="orb"></div>
    </div>

    <div class="row">
      <button class="power-btn" id="power-btn">
        <span class="dot"></span>
        <span id="power-label">Encender</span>
      </button>
      <div style="text-align:right">
        <label class="field-label">Brillo</label>
      </div>
    </div>
    <input type="range" id="brightness" min="10" max="100" value="60" />

    <div class="tabs">
      <div class="tab active" data-tab="color">Color</div>
      <div class="tab" data-tab="white">Blanco</div>
    </div>

    <div class="panel-section active" id="panel-color">
      <div class="swatches" id="swatches"></div>
    </div>

    <div class="panel-section" id="panel-white">
      <div class="temp-row">
        <input type="range" id="temp" min="2200" max="6500" value="4000" />
        <div class="temp-labels"><span>2200K cálido</span><span>6500K frío</span></div>
      </div>
    </div>

    <hr class="sep" />

    <div class="devices-head">
      <h2>Lámparas en la red</h2>
      <button class="scan-btn" id="scan-btn">Buscar</button>
    </div>
    <div class="device-list" id="device-list">
      <p class="empty-hint">Tocá "Buscar" para escanear tu red WiFi. La PC y la lámpara tienen que estar en la misma red.</p>
    </div>

    <div class="manual-ip">
      <input type="text" id="manual-ip-input" placeholder="o escribí la IP manualmente, ej: 192.168.1.42" />
      <button id="manual-ip-btn">Usar</button>
    </div>
  </div>

<script>
const API = "";
let selectedIp = localStorage.getItem("wiz_last_ip") || null;
let lastKnown = { state: false, dimming: 60, r: 255, g: 180, b: 84, temp: null };
let pollTimer = null;

const orb = document.getElementById("orb");
const powerBtn = document.getElementById("power-btn");
const powerLabel = document.getElementById("power-label");
const brightnessInput = document.getElementById("brightness");
const tempInput = document.getElementById("temp");
const connStatus = document.getElementById("conn-status");
const deviceList = document.getElementById("device-list");
const scanBtn = document.getElementById("scan-btn");

const presetColors = [
  { name: "cálido",  r: 255, g: 180, b: 107 },
  { name: "blanco",  r: 255, g: 244, b: 229 },
  { name: "rojo",    r: 255, g: 64,  b: 64  },
  { name: "naranja", r: 255, g: 140, b: 30  },
  { name: "verde",   r: 60,  g: 220, b: 110 },
  { name: "celeste", r: 80,  g: 190, b: 255 },
  { name: "azul",    r: 70,  g: 100, b: 255 },
  { name: "violeta", r: 170, g: 90,  b: 255 },
  { name: "rosa",    r: 255, g: 100, b: 190 },
];

function buildSwatches(){
  const wrap = document.getElementById("swatches");
  presetColors.forEach(c => {
    const el = document.createElement("div");
    el.className = "swatch";
    el.style.background = `rgb(${c.r},${c.g},${c.b})`;
    el.title = c.name;
    el.onclick = () => setColor(c.r, c.g, c.b);
    wrap.appendChild(el);
  });
  const custom = document.createElement("label");
  custom.className = "swatch custom-pick";
  custom.title = "color personalizado";
  const colorInput = document.createElement("input");
  colorInput.type = "color";
  colorInput.value = "#ffb454";
  colorInput.oninput = (e) => {
    const hex = e.target.value;
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    setColor(r, g, b);
  };
  custom.appendChild(colorInput);
  wrap.appendChild(custom);
}

function kelvinToRgb(kelvin){
  let temp = kelvin / 100;
  let r, g, b;
  if (temp <= 66){
    r = 255;
    g = 99.47 * Math.log(temp) - 161.12;
  } else {
    r = 329.7 * Math.pow(temp - 60, -0.133);
    g = 288.12 * Math.pow(temp - 60, -0.0755);
  }
  if (temp >= 66) b = 255;
  else if (temp <= 19) b = 0;
  else b = 138.52 * Math.log(temp - 10) - 305.04;
  const clamp = (v) => Math.max(0, Math.min(255, Math.round(v)));
  return [clamp(r), clamp(g), clamp(b)];
}

function updateOrb(){
  const isOn = lastKnown.state;
  let rgb;
  if (lastKnown.temp){
    rgb = kelvinToRgb(lastKnown.temp);
  } else {
    rgb = [lastKnown.r, lastKnown.g, lastKnown.b];
  }
  document.documentElement.style.setProperty("--glow-color", rgb.join(","));
  document.documentElement.style.setProperty("--glow-strength", isOn ? (lastKnown.dimming/100) : 0);
  orb.classList.toggle("off", !isOn);

  powerBtn.classList.toggle("on", isOn);
  powerLabel.textContent = isOn ? "Apagar" : "Encender";
}

function setConnStatus(text, ok){
  connStatus.textContent = text;
  connStatus.classList.toggle("ok", !!ok);
}

async function apiControl(payload){
  if (!selectedIp) return;
  payload.ip = selectedIp;
  try {
    const res = await fetch(`${API}/api/control`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error("sin respuesta");
    setConnStatus(`conectada · ${selectedIp}`, true);
  } catch(e){
    setConnStatus(`${selectedIp} no responde`, false);
  }
}

async function refreshState(){
  if (!selectedIp) return;
  try {
    const res = await fetch(`${API}/api/state?ip=${selectedIp}`);
    if (!res.ok) throw new Error();
    const data = await res.json();
    lastKnown.state = !!data.state;
    if (typeof data.dimming === "number") lastKnown.dimming = data.dimming;
    if (data.r != null) { lastKnown.r = data.r; lastKnown.g = data.g; lastKnown.b = data.b; lastKnown.temp = null; }
    if (data.temp) { lastKnown.temp = data.temp; }
    brightnessInput.value = lastKnown.dimming;
    if (lastKnown.temp) tempInput.value = lastKnown.temp;
    updateOrb();
    setConnStatus(`conectada · ${selectedIp}`, true);
  } catch(e){
    setConnStatus(`${selectedIp} no responde`, false);
  }
}

function setColor(r, g, b){
  lastKnown.r = r; lastKnown.g = g; lastKnown.b = b; lastKnown.temp = null;
  lastKnown.state = true;
  updateOrb();
  apiControl({ r, g, b, state: true });
}

function setTemp(k){
  lastKnown.temp = k;
  lastKnown.state = true;
  updateOrb();
  apiControl({ temp: k, state: true });
}

powerBtn.onclick = () => {
  lastKnown.state = !lastKnown.state;
  updateOrb();
  apiControl({ state: lastKnown.state });
};

brightnessInput.oninput = (e) => {
  lastKnown.dimming = parseInt(e.target.value, 10);
  updateOrb();
};
brightnessInput.onchange = (e) => {
  apiControl({ dimming: parseInt(e.target.value, 10), state: true });
};

tempInput.oninput = (e) => {
  lastKnown.temp = parseInt(e.target.value, 10);
  updateOrb();
};
tempInput.onchange = (e) => setTemp(parseInt(e.target.value, 10));

document.querySelectorAll(".tab").forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".panel-section").forEach(p => p.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById(`panel-${tab.dataset.tab}`).classList.add("active");
  };
});

function selectDevice(ip){
  selectedIp = ip;
  localStorage.setItem("wiz_last_ip", ip);
  document.querySelectorAll(".device-item").forEach(el => {
    el.classList.toggle("selected", el.dataset.ip === ip);
  });
  refreshState();
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(refreshState, 5000);
}

function renderDevices(devices){
  deviceList.innerHTML = "";
  if (!devices.length){
    deviceList.innerHTML = `<p class="empty-hint">No se encontró ninguna lámpara. Revisá que la PC esté en la misma red WiFi, o escribí la IP manualmente abajo.</p>`;
    return;
  }
  devices.forEach(d => {
    const el = document.createElement("div");
    el.className = "device-item" + (d.ip === selectedIp ? " selected" : "");
    el.dataset.ip = d.ip;
    const onOff = d.state && d.state.state ? `encendida${d.state.dimming ? " · " + d.state.dimming + "%" : ""}` : "apagada";
    el.innerHTML = `<span class="ip">${d.ip}</span><span class="meta">${onOff}</span>`;
    el.onclick = () => selectDevice(d.ip);
    deviceList.appendChild(el);
  });
}

scanBtn.onclick = async () => {
  scanBtn.disabled = true;
  scanBtn.textContent = "Buscando…";
  deviceList.innerHTML = `<p class="empty-hint">Escaneando la red, esto tarda unos segundos…</p>`;
  try {
    const res = await fetch(`${API}/api/discover`);
    const devices = await res.json();
    renderDevices(devices);
  } catch(e){
    deviceList.innerHTML = `<p class="empty-hint">Hubo un error escaneando la red.</p>`;
  } finally {
    scanBtn.disabled = false;
    scanBtn.textContent = "Buscar";
  }
};

document.getElementById("manual-ip-btn").onclick = () => {
  const val = document.getElementById("manual-ip-input").value.trim();
  if (val) selectDevice(val);
};

buildSwatches();
if (selectedIp){
  setConnStatus(`conectando · ${selectedIp}`);
  refreshState();
  pollTimer = setInterval(refreshState, 5000);
}
</script>
</body>
</html>
